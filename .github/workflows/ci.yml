name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: volrisk
          POSTGRES_PASSWORD: volrisk
          POSTGRES_DB: volrisk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U volrisk -d volrisk_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python (version pinned in .python-version)
        run: uv python install

      - name: Sync dependencies from lockfile
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Tests
        run: uv run pytest
        env:
          VOLRISK_TEST_DATABASE_URL: postgresql+psycopg://volrisk:volrisk@localhost:5432/volrisk_test
